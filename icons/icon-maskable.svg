<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Maskable icon: volledig vierkant achtergrond zodat het OS
    het in elke vorm kan uitsnijden (cirkel, squircle, etc.)
    Veilige zone: 10% marge = inhoud tussen px 51 en 461
  -->
  <defs>
    <filter id="mShadow" x="-12%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
    <linearGradient id="mGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Volledige vlag achtergrond (geen afgeknipte hoeken bij maskable) -->
  <rect x="0"   y="0" width="171" height="512" fill="#009246"/>
  <rect x="171" y="0" width="170" height="512" fill="#EFEFEF"/>
  <rect x="341" y="0" width="171" height="512" fill="#CE2B37"/>
  <rect width="512" height="512" fill="url(#mGlow)"/>

  <!-- Spraakbel — iets kleiner voor veilige zone -->
  <g filter="url(#mShadow)">
    <rect x="76" y="94" width="360" height="254" rx="50" ry="50" fill="white"/>
    <!-- Staart binnen veilige zone houden -->
    <polygon points="140,336  96,420  236,336" fill="white"/>
  </g>

  <!-- "IT" tekst -->
  <text
    text-anchor="middle"
    x="258"
    y="268"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="158"
    font-weight="900"
    letter-spacing="2">
    <tspan fill="#009246">I</tspan><tspan fill="#CE2B37">T</tspan>
  </text>
</svg>
