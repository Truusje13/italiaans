<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Afgeronde hoeken voor het app-icoon -->
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
    <!-- Schaduw voor de spraakbel -->
    <filter id="bubbleShadow" x="-12%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <!-- Subtiele glans op de vlag boven -->
    <linearGradient id="topGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === Italiaanse vlag als achtergrond === -->
  <g clip-path="url(#iconClip)">
    <!-- Groen -->
    <rect x="0"   y="0" width="171" height="512" fill="#009246"/>
    <!-- Wit -->
    <rect x="171" y="0" width="170" height="512" fill="#EFEFEF"/>
    <!-- Rood -->
    <rect x="341" y="0" width="171" height="512" fill="#CE2B37"/>
    <!-- Glans overlay -->
    <rect width="512" height="512" fill="url(#topGlow)"/>
  </g>

  <!-- === Spraakbel (met schaduw) === -->
  <g filter="url(#bubbleShadow)">
    <!-- Hoofd van de bel -->
    <rect x="60" y="74" width="392" height="278" rx="54" ry="54" fill="white"/>
    <!-- Staart van de bel (linksonder) -->
    <polygon points="128,338  76,444  232,338" fill="white"/>
  </g>

  <!-- === "IT" tekst in Italiaanse vlagkleuren === -->
  <text
    text-anchor="middle"
    x="258"
    y="278"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="175"
    font-weight="900"
    letter-spacing="2">
    <tspan fill="#009246">I</tspan><tspan fill="#CE2B37">T</tspan>
  </text>
</svg>
